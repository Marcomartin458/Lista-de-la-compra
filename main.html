<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lista de la Compra</title>
    <link rel="stylesheet" href="/styles/styleMain.css" />
    <script src="scripts/scriptsMain.js" defer></script>
  </head>
  <body>
    <header class="header">
      <h1 class="title">LISTA DE LA COMPRA</h1>

      <div class="busqueda">
        <input type="text" id="buscador" placeholder="Buscar por nombre..." />
        <button class="btn-buscar">Buscar</button>
      </div>

      <div class="panel">
        <h2>Cambio de tema</h2>
        <select name="menu" class="temas">
          <option value="normal">Normal</option>
          <option value="elegante">Elegante</option>
          <option value="gamer">Gamer</option>
          <option value="personalizado">Personalizado...</option>
        </select>
<dialog id="modal-tema">
  
  <h3 style="margin-bottom: 15px; color: var(--color-texto);">🎨 Crea tu propio tema 🎨</h3>
  
  <label for="color-primario">Color Primario (Fondos):</label>
  <input type="color" id="color-primario" value="#fdfdfd"> <label for="color-secundario">Color Secundario (Detalles):</label>
  <input type="color" id="color-secundario" value="#f0f0f0"> <label for="color-texto">Color del Texto:</label>
  <input type="color" id="color-texto" value="#1d1d1d"> <button id="aceptar-tema">Aplicar Colores</button>

</dialog>
      </div>
    </header>

    <main class="main">
      <h2 class="title-tarjetas">Productos</h2>
      <div class="contenedor"></div>
      <button id="btn-agregar">Agregar Producto</button>

      <dialog id="modal">
        <p id="mensaje"></p>
        <input
          type="file"
          name="imagen"
          id="imagenProducto"
          placeholder="Introduce la imagen del producto"
        /><br />
        <input
          type="text"
          name="nombre"
          id="nombreProducto"
          placeholder="Nombre del producto"
        /><br />
        <input
          type="number"
          name="cantidad"
          id="cantidadProducto"
          placeholder="Cantidad del producto"
        /><br />
        <input
          type="text"
          name="descripcion"
          id="descripcionProducto"
          placeholder="Breve descripcion del producto"
        /><br />

        <button id="aceptar">Añadir</button>
      </dialog>
    </main>

    <footer class="footer">
      <p>
        ProyectoConjuntoSupermercado. 2026 <br />
        &copy; Todos los derechos reservados.
      </p>
      <div class="social">
        <a href="https://github.com/adampda" class="github">GitHub Adam</a>
        <a href="https://github.com/Marcomartin458" class="github"
          >GitHub Marco</a
        >
        <br />
        <a
          href="https://www.linkedin.com/in/adam-mois%C3%A9s-p%C3%A9rez-de-andrade-10626720b/"
          class="linkedin"
          >LinkedIn Adam</a
        >
        <a
          href="https://www.linkedin.com/in/marco-mart%C3%ADn-%C3%A1lvarez-416b43322/"
          class="linkedin"
          >LinkedIn Marco</a
        >
      </div>
    </footer>
  </body>
</html>
